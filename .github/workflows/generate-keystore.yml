name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore picklereel-release.jks \
            -alias picklereel \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PickleReel Studio, OU=Dev, O=PickleReel, L=Manila, S=Metro Manila, C=PH" \
            -storepass picklereel123 \
            -keypass picklereel123

      - name: Print base64 (copy this → KEYSTORE_BASE64 secret)
        run: base64 -w 0 picklereel-release.jks
